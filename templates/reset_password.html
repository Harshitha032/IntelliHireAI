{% extends "base.html" %}

{% block content %}
<div class="auth-container glass-container">
    <h2 id="auth-title">Reset Password</h2>
    <p style="text-align: center; color: var(--gray); margin-bottom: 1.5rem;">Enter your new password below.</p>
    <form id="reset-password-form">
        <div class="form-group">
            <label>New Password</label>
            <div style="position:relative;">
                <input type="password" id="new-password" class="form-control" required style="padding-right: 40px;">
                <i class="fa-solid fa-eye" id="toggle-new-pwd" style="position:absolute; right:12px; top:12px; cursor:pointer; color:var(--gray);" onclick="togglePassword('new-password', 'toggle-new-pwd')"></i>
            </div>
        </div>
        <div class="form-group">
            <label>Confirm New Password</label>
            <div style="position:relative;">
                <input type="password" id="confirm-password" class="form-control" required style="padding-right: 40px;">
                <i class="fa-solid fa-eye" id="toggle-confirm-pwd" style="position:absolute; right:12px; top:12px; cursor:pointer; color:var(--gray);" onclick="togglePassword('confirm-password', 'toggle-confirm-pwd')"></i>
            </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">
            Reset Password
        </button>
    </form>
    <div id="reset-message" style="text-align: center; margin-top: 15px; font-weight:500;"></div>
    <div id="login-link-container" style="text-align: center; margin-top: 10px; display: none;">
        <a href="/login" class="btn btn-outline" style="display: inline-block;">Go to Login</a>
    </div>
</div>
{% endblock %}
