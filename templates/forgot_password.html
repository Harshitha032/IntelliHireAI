{% extends "base.html" %}

{% block content %}
<div class="auth-container glass-container">
    <h2 id="auth-title">Forgot Password</h2>
    <p style="text-align: center; color: var(--gray); margin-bottom: 1.5rem;">Enter your email to receive a password reset link.</p>
    <form id="forgot-password-form">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="reset-email" class="form-control" placeholder="john@example.com" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">
            Send Reset Link
        </button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem;">
        Remember your password? <a href="/login">Login here</a>
    </p>
    <div id="forgot-message" style="text-align: center; margin-top: 15px; font-weight:500;"></div>
    <div id="demo-link-container" style="text-align: center; margin-top: 10px; display: none;">
        <a id="demo-reset-link" href="#" class="btn btn-outline" style="display: inline-block;">(Demo) Click Here to Reset Password</a>
    </div>
</div>
{% endblock %}
